<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻幻 HuanHuan | 閃電蜜蜂小龍</title>
    <style>
        /* CSS 變數：定義主題色 */
        :root {
            --bg-dark: #07030a; 
            --primary-purple: #8b5cf6;
            --light-purple: #c4b5fd;
            --neon-purple: #a855f7;
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
        }

        /* 基礎設定與重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(168, 85, 247, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #1e1035 0%, var(--bg-dark) 70%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 2rem 0;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem; 
        }

        /* 👑 標題樣式 */
        .hero-title {
            text-align: center;
            animation: slideDownFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(-20px);
            z-index: 10;
        }

        .hero-title h1 {
            font-size: 5.5rem; 
            font-weight: 900; 
            letter-spacing: -2px; 
            line-height: 1;
            margin-bottom: 0.5rem;
            
            background: linear-gradient(135deg, #fff 0%, var(--light-purple) 45%, var(--primary-purple) 50%, #fff 55%, var(--light-purple) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 5s linear infinite;

            text-shadow: 
                0 0 10px rgba(168, 85, 247, 0.8),
                0 0 20px rgba(168, 85, 247, 0.5),
                0 0 40px rgba(168, 85, 247, 0.3);
        }

        .hero-title p {
            font-size: 1.8rem;
            color: var(--light-purple);
            font-weight: 700;
            letter-spacing: 10px; 
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
            margin-top: -5px;
            margin-left: 10px; 
        }

        /* 📸 中間圖片區塊：純上下漂浮，無互動 */
        .image-showcase {
            position: relative;
            width: 100%;
            max-width: 550px; 
            height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            opacity: 1; 
            animation: floatOnly 6s ease-in-out infinite;
            /* 讓圖片區塊不攔截滑鼠事件，確保完全沒有互動感 */
            pointer-events: none; 
        }

        /* 背景光暈 (保持靜態，隨圖片一起漂浮) */
        .image-showcase::before {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: var(--neon-purple);
            filter: blur(120px);
            opacity: 0.4;
            border-radius: 50%;
            z-index: -1;
        }

        .character-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.7));
            /* 移除了 transform 的過渡效果與 hover */
        }

        /* 📝 玻璃擬態資訊卡片 */
        .info-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            padding: 3rem;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            
            animation: slideUpFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
            animation-delay: 0.3s;
            z-index: 10;
        }

        .info-card h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--light-purple);
            margin-bottom: 2rem;
            border-left: 4px solid var(--neon-purple);
            padding-left: 1rem;
            line-height: 1;
        }

        /* 🔄 自我介紹欄位互動特效 (保留) */
        .info-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .info-list li {
            display: flex;
            align-items: center;
            font-size: 1.2rem;
            padding: 1rem 1.5rem;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid transparent;
            
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: default;
        }

        .info-list li:hover {
            background: rgba(139, 92, 246, 0.08);
            border-color: rgba(139, 92, 246, 0.2);
            transform: translateX(10px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .info-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: linear-gradient(to bottom, var(--neon-purple), var(--primary-purple));
            transition: width 0.3s ease;
            box-shadow: 0 0 15px var(--neon-purple);
        }

        .info-list li:hover::before {
            width: 5px;
        }

        .info-list strong {
            color: var(--light-purple);
            width: 140px;
            flex-shrink: 0;
            font-weight: 700;
            transition: color 0.3s ease;
        }
        
        .info-list li:hover strong {
            color: #fff;
            text-shadow: 0 0 5px var(--light-purple);
        }

        /* 社群按鈕區塊 */
        .social-links {
            margin-top: 2.5rem;
            display: flex;
            gap: 1.2rem;
            justify-content: flex-start;
        }

        .social-btn {
            text-decoration: none;
            color: var(--text-main);
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--primary-purple), var(--neon-purple));
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
        }

        .social-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(168, 85, 247, 0.4);
            border-color: transparent;
        }

        .social-btn:hover::before {
            opacity: 1;
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            .hero-title h1 { font-size: 3.5rem; }
            .hero-title p { font-size: 1.2rem; letter-spacing: 5px; }
            .image-showcase { height: 350px; max-width: 350px; }
            .info-card { padding: 2rem; }
            .info-list li { flex-direction: column; align-items: flex-start; gap: 0.3rem; padding: 1rem; }
            .info-list strong { width: 100%; }
            .social-links { flex-direction: column; gap: 0.8rem; }
            .social-btn { justify-content: center; }
        }

        /* 關鍵格動畫 */
        @keyframes slideDownFade {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        /* 💡 圖片純漂浮動畫 */
        @keyframes floatOnly {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="hero-title">
            <h1>幻幻</h1>
            <p>HuanHuan</p>
        </header>

        <div class="image-showcase">
            <img src="profile.png" alt="幻幻 HuanHuan 閃電蜜蜂小龍" class="character-img">
        </div>

        <div class="info-card">
            <h2>自我介紹</h2>
            <ul class="info-list">
                <li><strong>簡介</strong> 是隻閃電蜜蜂小龍</li>

                <li><strong>設定設計</strong> 冷軌 Kaltespur</li>
                <li><strong>毛毛工作室</strong> 漁屋 Yuwu Fursuit</li>
            </ul>

        </div>
    </div>

</body>
</html>
